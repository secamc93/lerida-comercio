name: lerida-comercio-prod

services:
  postgres:
    image: postgres:15-alpine
    container_name: lerida-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-lerida}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
      POSTGRES_DB: ${DB_NAME:-lerida_comercio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lerida} -d ${DB_NAME:-lerida_comercio}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lerida-net

  migration:
    build:
      context: ../../back
      dockerfile: migration/Dockerfile
    container_name: lerida-migration
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-lerida}
      DB_PASS: ${DB_PASS:-changeme}
      DB_NAME: ${DB_NAME:-lerida_comercio}
      DB_SSLMODE: disable
    command: ["/app/migration", "--seed"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lerida-net
    restart: "no"

  back-central:
    build:
      context: ../../back
      dockerfile: central/Dockerfile
    container_name: lerida-back
    restart: unless-stopped
    environment:
      APP_ENV: production
      HTTP_PORT: 3050
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-lerida}
      DB_PASS: ${DB_PASS:-changeme}
      DB_NAME: ${DB_NAME:-lerida_comercio}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-please-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks:
      - lerida-net

  front-central:
    build:
      context: ../../front/central
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
    container_name: lerida-front
    restart: unless-stopped
    environment:
      API_BASE_URL: http://back-central:3050
      NODE_ENV: production
    depends_on:
      - back-central
    networks:
      - lerida-net

  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    container_name: lerida-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - front-central
      - back-central
    networks:
      - lerida-net

volumes:
  postgres_data:
    name: lerida-postgres-data-prod

networks:
  lerida-net:
    name: lerida-net-prod
    driver: bridge
