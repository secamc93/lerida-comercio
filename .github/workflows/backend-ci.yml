name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "back/central/**"
      - "back/migration/**"
      - "back/models/**"
      - "infra/compose-deploy/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "back/central/**"
      - "back/migration/**"
      - "back/models/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  AWS_ROLE: arn:aws:iam::334689162817:role/lerida-comercio-github-actions
  ECR_IMAGE: 334689162817.dkr.ecr.us-east-1.amazonaws.com/lerida-comercio
  EC2_HOST: 34.235.36.96

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: lerida
          POSTGRES_PASSWORD: lerida_dev_2026
          POSTGRES_DB: lerida_comercio
        options: >-
          --health-cmd "pg_isready -U lerida"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: |
            back/central/go.sum
            back/migration/go.sum

      - name: Build migration
        working-directory: back/migration
        run: go build -o /dev/null ./...

      - name: Build central
        working-directory: back/central
        run: go build -o /dev/null ./...

      - name: Tests central
        working-directory: back/central
        run: go test ./... -count=1

      - name: Run migrations
        working-directory: back/migration
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: lerida
          DB_PASS: lerida_dev_2026
          DB_NAME: lerida_comercio
        run: go run cmd/main.go --seed

  build-push:
    needs: test
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push imagen backend (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: ./back
          file: ./back/central/docker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_IMAGE }}:backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push imagen migration (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: ./back
          file: ./back/migration/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_IMAGE }}:migration
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Preparar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sincronizar docker-compose
        run: |
          scp -i ~/.ssh/deploy.pem infra/compose-deploy/docker-compose.yml \
            ubuntu@"$EC2_HOST":/home/ubuntu/lerida-comercio/docker-compose.yml

      - name: Deploy en EC2
        run: |
          ssh -i ~/.ssh/deploy.pem ubuntu@"$EC2_HOST" bash -s <<'EOF'
          set -e
          cd /home/ubuntu/lerida-comercio
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin 334689162817.dkr.ecr.us-east-1.amazonaws.com
          docker compose pull migration back-central
          docker compose up -d migration back-central
          docker image prune -f
          EOF
