name: Nginx CI/CD

on:
  push:
    branches: [main]
    paths:
      - "infra/nginx/**"
      - ".github/workflows/nginx-ci.yml"
  pull_request:
    paths:
      - "infra/nginx/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  AWS_ROLE: arn:aws:iam::334689162817:role/lerida-comercio-github-actions
  ECR_IMAGE: 334689162817.dkr.ecr.us-east-1.amazonaws.com/lerida-comercio
  EC2_HOST: 34.235.36.96

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint nginx.conf
        run: |
          # --add-host: nginx -t resuelve los upstreams al testear el config;
          # los nombres de servicio no existen en el runner, los apuntamos a loopback.
          docker run --rm -v ${{ github.workspace }}/infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro \
            --add-host back-central:127.0.0.1 --add-host front-central:127.0.0.1 \
            nginx:1.27-alpine nginx -t

  build-push:
    needs: lint
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push imagen nginx (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: ./infra/nginx
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_IMAGE }}:nginx
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Preparar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy en EC2
        run: |
          ssh -i ~/.ssh/deploy.pem ubuntu@"$EC2_HOST" bash -s <<'EOF'
          set -e
          cd /home/ubuntu/lerida-comercio
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin 334689162817.dkr.ecr.us-east-1.amazonaws.com
          docker compose pull nginx
          docker compose up -d nginx
          docker image prune -f
          EOF
